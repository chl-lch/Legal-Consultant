[alembic]
script_location = alembic
# 实际连接字符串在 alembic/env.py 中从 DATABASE_URL 环境变量读取，此行不生效
# 保留占位符以满足 alembic 格式要求
sqlalchemy.url = postgresql+asyncpg://lexicounsel:PLACEHOLDER@localhost:5432/lexicounsel

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

