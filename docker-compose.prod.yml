version: "3.9"

# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file:
#   - Removes exposed ports from postgres and backend (only nginx is public)
#   - Adds a dedicated nginx reverse-proxy with SSL termination
#   - Adds certbot for automatic Let's Encrypt certificate renewal

services:
  postgres:
    restart: unless-stopped
    ports: []   # not exposed externally in production

  backend:
    restart: unless-stopped
    ports: []   # not exposed externally; nginx proxies /api/
    environment:
      APP_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_ANNUAL_PRICE_ID: ${STRIPE_ANNUAL_PRICE_ID:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://yourdomain.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}

  frontend:
    restart: unless-stopped
    ports: []   # not exposed externally; nginx serves static files directly
    volumes:
      # expose built static files to nginx
      - frontend_dist:/usr/share/nginx/html

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/rendered.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    command: >
      /bin/sh -c "nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt
    # Renew certificates; run manually or via cron (see deploy.sh)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

volumes:
  postgres_data:
  frontend_dist:
