# Secret：存储 backend 的敏感配置
#
# 注意：DATABASE_URL 里的密码必须和 postgres/secret.yaml 里的 POSTGRES_PASSWORD 一致
#
# 使用前必须替换：
#   1. REPLACE_WITH_STRONG_PASSWORD  → 与 postgres/secret.yaml 相同的密码
#   2. REPLACE_WITH_YOUR_OPENAI_KEY  → 你的 OpenAI API Key (sk-...)
#
# 不要把真实 key 提交到 git！
# 生产建议：用 kubectl create secret 命令创建，而不是提交 yaml 文件
#   kubectl create secret generic backend-secret \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://..." \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     -n lexicounsel
#
# 部署命令：kubectl apply -f k8s/backend/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: lexicounsel
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://lexicounsel:REPLACE_WITH_STRONG_PASSWORD@postgres:5432/lexicounsel"
  OPENAI_API_KEY: "REPLACE_WITH_YOUR_OPENAI_KEY"
  LANGSMITH_API_KEY: ""
