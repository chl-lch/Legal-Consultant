# Secret：存储敏感信息（数据库密码等）
#
# 概念：
#   Secret 的 data 字段需要 base64 编码，stringData 可以直接写明文（k8s 自动编码）
#   Secret 不会出现在 kubectl describe pod 的输出里
#   生产环境建议配合 external-secrets 或 Vault 使用，不要把真实密码提交到 git
#
# 使用前必须替换：
#   POSTGRES_PASSWORD: 换成强密码（建议 32 位随机字符）
#
# 生成随机密码命令：
#   openssl rand -base64 32
#
# 部署命令：kubectl apply -f k8s/postgres/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: lexicounsel
type: Opaque
stringData:
  POSTGRES_DB: lexicounsel
  POSTGRES_USER: lexicounsel
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
