# PersistentVolumeClaim (PVC)：申请持久化存储
#
# 概念：
#   Pod 是短暂的——Pod 重启/重建后，容器内的文件会消失
#   PVC 申请一块持久化磁盘，挂载到 Pod 里，Pod 死了数据还在
#
#   accessModes:
#     ReadWriteOnce  - 同一时刻只能被一个 Node 上的 Pod 挂载（适合数据库）
#     ReadWriteMany  - 可同时被多个 Pod 挂载（需要 NFS 或云存储支持）
#
#   storageClassName:
#     不同云平台的值不同：
#       minikube (本地测试): standard
#       AWS EKS:             gp2 或 gp3
#       GKE:                 standard
#       AKS:                 default 或 managed-premium
#     留空则使用集群默认 StorageClass
#
# 部署命令：kubectl apply -f k8s/postgres/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: lexicounsel
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: gp3  # 根据你的云平台取消注释并修改
