# StatefulSet：管理有状态应用（数据库）
#
# 概念：
#   Deployment 管理无状态 Pod（Pod 名字随机、可随意替换）
#   StatefulSet 管理有状态 Pod：
#     - Pod 有固定名字：postgres-0, postgres-1...
#     - Pod 按顺序启动/停止
#     - 每个 Pod 绑定自己的 PVC，重建后还能找回同一份数据
#
#   数据库必须用 StatefulSet，不能用 Deployment
#
# readinessProbe vs livenessProbe:
#   readinessProbe: Pod 准备好接受流量了吗？失败则 Service 不向它转发请求
#   livenessProbe:  Pod 还活着吗？失败则 k8s 重启这个容器
#
# resources.requests vs limits:
#   requests: 调度时保证分配的最小资源（影响 Pod 调度到哪个 Node）
#   limits:   容器能使用的最大资源（超过则被 OOM Kill 或 CPU 限速）
#
# 部署命令：kubectl apply -f k8s/postgres/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lexicounsel
  labels:
    app: postgres
spec:
  serviceName: postgres   # 必须与 headless Service 同名
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999        # postgres 官方镜像的 GID，保证数据目录权限正确
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # 数据目录——必须和 PVC 挂载路径一致
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
