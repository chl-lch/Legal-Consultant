version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexicounsel}
      POSTGRES_USER: ${POSTGRES_USER:-lexicounsel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexicounsel} -d ${POSTGRES_DB:-lexicounsel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: LexiCounsel API
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      API_PREFIX: /api/v1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lexicounsel}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-lexicounsel}
      UPLOAD_DIR: /app/data/uploads
      FAISS_INDEX_PATH: /app/data/indexes/faiss
      BM25_INDEX_PATH: /app/data/indexes/bm25_index.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-LexiCounsel}
      RRF_K: ${RRF_K:-60}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-6}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      EVALUATION_MIN_SCORE: ${EVALUATION_MIN_SCORE:-7}
      MAX_REFINEMENT_ATTEMPTS: ${MAX_REFINEMENT_ATTEMPTS:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-90}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  postgres_data:
